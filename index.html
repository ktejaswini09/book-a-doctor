<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // 1. Intercept Vite HMR WebSocket connection to make it succeed silently
      (function() {
        const OriginalWebSocket = window.WebSocket;
        if (!OriginalWebSocket) return;

        function CustomWebSocket(url, protocols) {
          const isViteWS = (protocols && (protocols === 'vite-hmr' || (Array.isArray(protocols) && protocols.includes('vite-hmr')))) || 
                           (typeof url === 'string' && (url.includes('vite') || url.includes('hmr') || url.includes('ws://localhost:3000') || url.includes('wss://localhost:3000')));
                           
          if (isViteWS) {
            // Create a mock WebSocket that mimics a successful connection that stays idle
            const dummy = {
              url: url,
              readyState: 0, // CONNECTING
              bufferedAmount: 0,
              extensions: "",
              protocol: Array.isArray(protocols) ? protocols[0] : (protocols || ""),
              binaryType: "blob",
              send: function() {},
              close: function() {},
              addEventListener: function(type, listener) {
                if (type === 'open') {
                  setTimeout(() => {
                    this.readyState = 1; // OPEN
                    if (typeof this.onopen === 'function') this.onopen();
                    listener({ type: 'open' });
                  }, 50);
                }
              },
              removeEventListener: function() {},
              dispatchEvent: function() { return true; },
              onopen: null,
              onerror: null,
              onclose: null,
              onmessage: null
            };
            
            const handlers = ['open', 'error', 'close', 'message'];
            handlers.forEach(h => {
              Object.defineProperty(dummy, 'on' + h, {
                get() { return this['_' + h]; },
                set(val) { this['_' + h] = val; }
              });
            });
            
            return dummy;
          }
          
          return new OriginalWebSocket(url, protocols);
        }

        CustomWebSocket.prototype = OriginalWebSocket.prototype;
        for (const key in OriginalWebSocket) {
          if (OriginalWebSocket.hasOwnProperty(key)) {
            CustomWebSocket[key] = OriginalWebSocket[key];
          }
        }
        
        window.WebSocket = CustomWebSocket;
      })();

      // 2. Suppress benign WebSocket connection errors and unhandled promise rejections
      window.addEventListener('unhandledrejection', function(event) {
        try {
          const reasonStr = event.reason ? (event.reason.message || String(event.reason)) : '';
          if (reasonStr.includes('WebSocket') || reasonStr.includes('vite') || reasonStr.includes('closed without opened')) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
          }
        } catch (e) {
          // ignore
        }
      }, true);
      
      window.addEventListener('error', function(event) {
        try {
          const msg = event.message || '';
          if (msg.includes('WebSocket') || msg.includes('vite') || msg.includes('closed without opened')) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
          }
        } catch (e) {
          // ignore
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
